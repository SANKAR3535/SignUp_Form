<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Modern Registration</title>
    <meta name="description" content="Secure and responsive sign up form with real-time validation.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="signup.css">
</head>

<body>

    <main id="box">
        <h1 id="signup">Create Account</h1>

        <form id="form" novalidate>
            <div class="field-group">
                <label for="iusername">Username</label>
                <input type="text" id="iusername" placeholder="Choose a username">
                <p id="ename"></p>
            </div>

            <div class="field-group">
                <label for="iemail">Email Address</label>
                <input type="email" id="iemail" placeholder="you@example.com">
                <p id="eemail"></p>
            </div>

            <div class="field-group">
                <label for="ipassword">Password</label>
                <div id="divpassword">
                    <input type="password" id="ipassword" placeholder="Create a password">
                    <i class="fas fa-eye" id="togglePassword"></i>
                </div>
                <p id="epassword"></p>
            </div>

            <div class="field-group">
                <label for="iconfirmpassword">Confirm Password</label>
                <input type="password" id="iconfirmpassword" placeholder="Verify your password">
                <p id="ecpassword"></p>
            </div>

            <button type="submit" id="ibutton">GET STARTED</button>
        </form>
    </main>

    <script src="signup.js"></script>
</body>

</html>
